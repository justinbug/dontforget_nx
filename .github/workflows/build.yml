name: Build
on:
  push:
    branches: ["**"]
    tags: ["v*.*.*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # required for softprops/action-gh-release to publish releases

jobs:
  build:
    name: Build NRO
    runs-on: ubuntu-latest
    # Official devkitPro image ships devkitA64 + libnx + switch-tools + ALL
    # current portlibs (SDL2, mesa, ffmpeg, freetype, libpng, etc) preinstalled.
    container:
      image: devkitpro/devkita64:latest
    steps:
      # -----------------------------------------------------------------------
      # 1. Source
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Port libraries
      # The image already ships all current portlibs, so no pacman network
      # call should be needed. We verify they're present; only if something
      # is actually missing do we fall back to dkp-pacman (with a UA-spoofed
      # XferCommand + retries, since pkg.devkitpro.org has been intermittently
      # 403'ing CI traffic — see https://github.com/devkitPro/pacman/issues/62).
      # -----------------------------------------------------------------------
      - name: Verify port libraries are present
        run: |
          missing=0
          for lib in libSDL2.a libfreetype.a libpng.a libavcodec.a; do
            if ! find /opt/devkitpro/portlibs/switch -name "$lib" | grep -q .; then
              echo "::warning::Missing expected portlib: $lib"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "One or more portlibs missing from the image. Falling back to dkp-pacman install."
            PACMAN_CONF=$(find /opt/devkitpro -name pacman.conf | head -n1)
            sed -i '/^\[options\]/a XferCommand = /usr/bin/curl -L -A "Mozilla/5.0" -C - -f --retry 3 --retry-delay 5 -o %o %u' "$PACMAN_CONF"
            for i in 1 2 3 4 5; do
              dkp-pacman -Sy --noconfirm \
                switch-sdl2 switch-mesa switch-libdrm_nouveau \
                switch-ffmpeg switch-freetype switch-libpng && break
              echo "Attempt $i failed, retrying in 15s..."
              sleep 15
            done
          else
            echo "All required portlibs already present in image, skipping pacman."
          fi

      # -----------------------------------------------------------------------
      # 3. Build
      # DEVKITPRO is already set inside the container (/opt/devkitpro).
      # -----------------------------------------------------------------------
      - name: Build
        run: make -j$(nproc)

      # -----------------------------------------------------------------------
      # 4. Upload .nro for every branch/PR build
      # -----------------------------------------------------------------------
      - name: Upload NRO artifact
        uses: actions/upload-artifact@v4
        with:
          name: dontforget_nx-${{ github.sha }}
          path: |
            dontforget_nx.nro
          if-no-files-found: error
          retention-days: 30

      # -----------------------------------------------------------------------
      # 5. GitHub Release on version tags (v1.0.0, v1.2.3-rc1, …)
      # Attach the .nro directly to the release so users can grab it
      # without navigating to the Actions tab.
      # -----------------------------------------------------------------------
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dontforget_nx.nro
          generate_release_notes: true
          fail_on_unmatched_files: true
